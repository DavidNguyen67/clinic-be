- rest:
    path: /v1/auth
    post:
      - path: /register
        to: direct:auth-register
      - path: /login
        to: direct:auth-login
      - path: /forgot-password
        to: direct:auth-forgot-password
      - path: /verify-otp
        to: direct:auth-verify-otp
      - path: /reset-password
        to: direct:auth-reset-password
      - path: /change-password
        to: direct:auth-change-password
      - path: /refresh
        to: direct:auth-refresh
    get:
      - path: /logout
        to: direct:auth-logout

- rest:
    path: /v1/auth
    get:
      - path: /me
        to: direct:auth-me
      - path: /profile
        to: direct:auth-get-profile

- rest:
    path: /v1/settings
    get:
      - path: /clinic
        to: direct:clinic-settings

- rest:
    path: /v1/clinic-figures
    get:
      - path: /
        to: direct:clinic-figures

- rest:
    path: /v1/doctor-count
    get:
      - path: /
        to: direct:doctor-count

- rest:
    path: /v1/top-doctors
    get:
      - path: /
        to: direct:top-doctors

- rest:
    path: /v1/doctors
    get:
      - path: /
        to: direct:doctors

- rest:
    path: /v1/patient-count
    get:
      - path: /
        to: direct:patient-count

- rest:
    path: /v1/specialty-count
    get:
      - path: /
        to: direct:specialty-count

- rest:
    path: /v1/specialty
    get:
      - path: /
        to: direct:specialty

- rest:
    path: /v1/slot-availability
    get:
      - path: /
        to: direct:slot-availability

- rest:
    path: /v1/search
    get:
      - path: /
        to: direct:search

- rest:
    path: /v1/doctor/schedule
    get:
      - path: /
        to: direct:doctor-get-schedule
    post:
      - path: /
        to: direct:doctor-add-schedule
    delete:
      - path: /{id}
        to: direct:doctor-delete-schedule

- rest:
    path: /v1/doctor/leaves
    post:
      - path: /
        to: direct:doctor-request-leave
    get:
      - path: /
        to: direct:doctor-get-leaves

- rest:
    path: /v1/appointments
    post:
      - path: /
        to: direct:appointment-create
    get:
      - path: /
        to: direct:appointment-list
      - path: /today
        to: direct:appointment-today
      - path: /queue
        to: direct:appointment-queue

- rest:
    path: /v1/appointments
    get:
      - path: /{id}
        to: direct:appointment-get
    patch:
      - path: /{id}/cancel
        to: direct:appointment-cancel
      - path: /{id}/confirm
        to: direct:appointment-confirm
      - path: /{id}/checkin
        to: direct:appointment-checkin
      - path: /{id}/start
        to: direct:appointment-start
      - path: /{id}/complete
        to: direct:appointment-complete

- rest:
    path: /v1/patient/profile
    get:
      - path: /
        to: direct:patient-profile-get
    put:
      - path: /
        to: direct:patient-profile-update

- rest:
    path: /v1/patient/appointments
    get:
      - path: /
        to: direct:patient-appointments

- rest:
    path: /v1/patient/history
    get:
      - path: /
        to: direct:patient-history

- rest:
    path: /v1/admin/doctor/leaves
    get:
      - path: /
        to: direct:admin-doctor-get-leaves
    patch:
      - path: /{id}/approve
        to: direct:admin-doctor-approve-leave

