- rest:
    path: /v1/auth
    post:
      - path: /register
        to: direct:auth-register
      - path: /login
        to: direct:auth-login
      - path: /forgot-password
        to: direct:auth-forgot-password
      - path: /verify-otp
        to: direct:auth-verify-otp
      - path: /reset-password
        to: direct:auth-reset-password
      - path: /change-password
        to: direct:auth-change-password
      - path: /refresh
        to: direct:auth-refresh
      - path: /logout
        to: direct:auth-logout

- rest:
    path: /v1/auth
    get:
      - path: /me
        to: direct:auth-me
      - path: /profile
        to: direct:auth-get-profile

- rest:
    path: /v1/admin/specialties
    post:
      - path: /
        to: direct:specialty-create
    get:
      - path: /
        to: direct:specialty-list
      - path: /count
        to: direct:specialty-count
      - path: /{id}
        to: direct:specialty-get
    patch:
      - path: /{id}
        to: direct:specialty-update
    delete:
      - path: /{id}
        to: direct:specialty-delete

- rest:
    path: /v1/admin/services
    post:
      - path: /
        to: direct:service-create
    get:
      - path: /
        to: direct:service-list
      - path: /count
        to: direct:service-count
      - path: /{id}
        to: direct:service-get
    patch:
      - path: /{id}
        to: direct:service-update
    delete:
      - path: /{id}
        to: direct:service-delete