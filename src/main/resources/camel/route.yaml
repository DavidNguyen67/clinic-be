- route:
    id: clinic-settings-route
    from:
      uri: direct:clinic-settings
      steps:
        - process:
            ref: getClinicSettingsProcessor
        - marshal:
            json: { }

- route:
    id: clinic-figures-route
    from:
      uri: direct:clinic-figures
      steps:
        - process:
            ref: getClinicFigures
        - marshal:
            json: { }


- route:
    id: create-doctor-route
    from:
      uri: direct:create-doctor
      steps:
        - process:
            ref: createDoctorProcessor
        - marshal:
            json: { }
