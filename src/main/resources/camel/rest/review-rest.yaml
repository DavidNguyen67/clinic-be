- rest:
    path: /v1/admin/review
    get:
      - path: /
        to: direct:admin-review-list
      - path: /count
        to: direct:admin-review-count
      - path: /{id}
        to: direct:admin-review-get
    post:
      - path: /
        to: direct:admin-review-create
    patch:
      - path: /{id}
        to: direct:admin-review-update
    delete:
      - path: /{id}
        to: direct:admin-review-delete

- rest:
    path: /v1/doctor/review
    get:
      - path: /
        to: direct:doctor-review-list
      - path: /count
        to: direct:doctor-review-count
      - path: /{id}
        to: direct:doctor-review-get

- rest:
