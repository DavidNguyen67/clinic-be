- rest:
    path: /v1/admin/promotion
    post:
      - path: /
        to: direct:promotion-create
    get:
      - path: /
        to: direct:promotion-list
      - path: /count
        to: direct:promotion-count
      - path: /{id}
        to: direct:promotion-get
    patch:
      - path: /{id}
        to: direct:promotion-update
      - path: /restore/{id}
        to: direct:promotion-restore
    delete:
      - path: /{id}
        to: direct:promotion-delete

