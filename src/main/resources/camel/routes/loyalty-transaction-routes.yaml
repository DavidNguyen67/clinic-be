            name: X-DTO-Class
            constant: com.camel.clinic.dto.loyaltyTransaction.UpdateLoyaltyTransactionDto
        - process:
            ref: requestDeserializerProcessor
        - process:
            ref: validationProcessor
        - process:
            ref: loyaltyTransactionUpdateProcessor
        - marshal:
            json: { }

- route:
