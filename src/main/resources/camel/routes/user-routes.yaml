- onException:
    exception:
      - java.lang.Exception
    handled:
      constant: true
    steps:
      - process:
          ref: exceptionProcessor
      - marshal:
          json: { }

- route:
    id: user-list-route
    from:
      uri: direct:user-list
      steps:
        - process:
            ref: userListProcessor
        - marshal:
            json: { }

- route:
    id: user-statistics-route
    from:
      uri: direct:user-statistics
      steps:
        - process:
            ref: userStatisticsProcessor
        - marshal:
            json: { }

- route:
    id: user-seed-route
    from:
      uri: direct:user-seed
      steps:
        - process:
            ref: userSeedProcessor
        - marshal:
            json: { }

- route:
    id: user-count-route
    from:
      uri: direct:user-count
      steps:
        - process:
            ref: userCountProcessor
        - marshal:
            json: { }

- route:
    id: user-get-route
    from:
      uri: direct:user-get
      steps:
        - process:
            ref: userGetProcessor
        - marshal:
            json: { }