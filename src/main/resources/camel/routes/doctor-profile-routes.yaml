        - process:
            ref: requestDeserializerProcessor
        - process:
            ref: validationProcessor
        - process:
            ref: doctorProfileUpdateProcessor
        - marshal:
            json: { }

- route:
    id: doctor-profile-restore-route
    from:
      uri: direct:doctor-profile-restore
      steps:
        - process:
