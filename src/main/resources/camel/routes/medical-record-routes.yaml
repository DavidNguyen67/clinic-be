- onException:
    exception:
      - java.lang.Exception
    handled:
      constant: true
    steps:
      - process:
          ref: exceptionProcessor
      - marshal:
          json: { }

- route:
    id: medical-record-list-route
    from:
      uri: direct:medical-record-list
      steps:
        - process:
            ref: medicalRecordListProcessor
        - marshal:
            json: { }

- route:
    id: medical-record-count-route
    from:
      uri: direct:medical-record-count
      steps:
        - process:
            ref: medicalRecordCountProcessor
        - marshal:
            json: { }

- route:
    id: medical-record-get-route
    from:
      uri: direct:medical-record-get
      steps:
        - process:
            ref: medicalRecordGetProcessor
        - marshal:
            json: { }

- route:
    id: medical-record-create-route
    from:
      uri: direct:medical-record-create
      steps:
        - setHeader:
            name: X-DTO-Class
            constant: com.camel.clinic.dto.medicalRecord.CreateMedicalRecordDto
        - process:
            ref: requestDeserializerProcessor
        - process:
            ref: validationProcessor
        - process:
            ref: medicalRecordCreateProcessor
        - marshal:
            json: { }

- route:
    id: medical-record-update-route
    from:
