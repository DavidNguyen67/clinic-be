            name: X-DTO-Class
            constant: com.camel.clinic.dto.medicalRecord.UpdateMedicalRecordDto
        - process:
            ref: requestDeserializerProcessor
        - process:
            ref: validationProcessor
        - process:
            ref: medicalRecordUpdateProcessor
        - marshal:
            json: { }

- route:
