- onException:
    exception:
      - java.lang.Exception
    handled:
      constant: true
    steps:
      - process:
          ref: exceptionProcessor
      - marshal:
          json: { }

- onCompletion:
    onCompleteOnly: true
    steps:
      - process:
          ref: apiResponseWrapperProcessor

- route:
    id: auth-register-route
    from:
      uri: direct:auth-register
      steps:
        - setHeader:
            name: X-DTO-Class
            constant: com.camel.clinic.dto.auth.RegisterRequestDTO
        - process:
            ref: requestDeserializerProcessor
        - process:
            ref: validationProcessor
        - process:
            ref: registerAuthProcessor
        - marshal:
            json: { }

