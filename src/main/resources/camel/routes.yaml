- onException:
    exception:
      - java.lang.Exception
    handled:
      constant: true
    steps:
      - process:
          ref: exceptionProcessor
      - marshal:
          json: { }

- onCompletion:
    onCompleteOnly: true
    steps:
      - process:
          ref: apiResponseWrapperProcessor

