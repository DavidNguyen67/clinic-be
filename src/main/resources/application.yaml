spring:
  jackson:
    time-zone: ${TZ}
  application:
    name: ${APP_NAME}

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX}
      minimum-idle: ${DB_POOL_MIN}
      connection-timeout: ${DB_CONN_TIMEOUT}
      idle-timeout: ${DB_IDLE_TIMEOUT}
      max-lifetime: ${DB_MAX_LIFETIME}

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    validate-on-migrate: true
    clean-disabled: true
    user: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    url: ${DB_URL}
    schemas:
      - public

  data:
    mongodb:
      uri: ${MONGODB_URI}
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        "[format_sql]": true
        "[use_sql_comments]": true
        order_inserts: true
        order_updates: true
        jdbc:
          batch_size: 50
    open-in-view: false

  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    virtual-host: /
    connection-timeout: 60000
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 10
        retry:
          enabled: true
          initial-interval: 3000
          max-attempts: 3
          multiplier: 2.0
          max-interval: 30000
    template:
      retry:
        enabled: true
        initial-interval: 1000
        max-attempts: 3
        multiplier: 2.0

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: ${MAIL_DEBUG:false}

rabbitmq:
  exchange:
    notification: ${RABBITMQ_EXCHANGE_NOTIFICATION}
    task: ${RABBITMQ_EXCHANGE_TASK}
    pubsub: ${RABBITMQ_EXCHANGE_PUBSUB}
    dead-letter: ${RABBITMQ_EXCHANGE_DLX}
  queue:
    email: ${RABBITMQ_QUEUE_EMAIL}
    push-notification: ${RABBITMQ_QUEUE_PUSH}
    task-background: ${RABBITMQ_QUEUE_TASK}
    pubsub-broadcast: ${RABBITMQ_QUEUE_PUBSUB}
    email-dlq: ${RABBITMQ_QUEUE_EMAIL_DLQ}
    push-dlq: ${RABBITMQ_QUEUE_PUSH_DLQ}
    task-dlq: ${RABBITMQ_QUEUE_TASK_DLQ}
  routing-key:
    email: ${RABBITMQ_RK_EMAIL}
    push-notification: ${RABBITMQ_RK_PUSH}
    task-background: ${RABBITMQ_RK_TASK}
    pubsub-broadcast: ${RABBITMQ_RK_PUBSUB}
    email-dlq: ${RABBITMQ_RK_EMAIL_DLQ}
    push-dlq: ${RABBITMQ_RK_PUSH_DLQ}
    task-dlq: ${RABBITMQ_RK_TASK_DLQ}

camel:
  main:
    routes-include-pattern: classpath:camel/routes/*.yaml,classpath:camel/rest/*.yaml
  servlet:
    mapping:
      context-path: /api/*
  rest:
    component: servlet
    context-path: /api/*
    binding-mode: off

jwt:
  private-key-path: keys/private_key_pkcs8.pem
  public-key-path: keys/public_key.pem
  expiration: 86400000
  refresh-expiration: 604800000
  refresh-cookie-name: refreshToken

logging:
  level:
    org.apache.camel.component.rest: TRACE
    org.apache.camel.component.servlet: TRACE
    org.apache.camel.http: DEBUG
    org.apache.camel.support: DEBUG
    org.apache.camel.component.sql: DEBUG
    org.apache.camel.component.sql.stored: DEBUG
    oracle.jdbc: DEBUG
    org.springframework.jdbc: DEBUG
    org.springframework.jdbc.core: TRACE

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

kind: Application